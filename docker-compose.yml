version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: asterdrive
      POSTGRES_USER: asterdrive
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asterdrive"]
      interval: 10s
      timeout: 5s
      retries: 5

  asterdrive:
    build: .
    ports:
      - "3000:3000"
    environment:
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: 3000
      DATABASE__URL: postgresql://asterdrive:password@postgres/asterdrive
      JWT__SECRET: change-this-secret-in-production
      JWT__EXPIRATION_HOURS: 24
      STORAGE__BACKEND: local
      STORAGE__LOCAL_PATH: /app/data/uploads
      RUST_LOG: info
    volumes:
      - upload_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  upload_data:
