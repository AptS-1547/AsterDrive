name: CI

on:
  push:
    paths:
      - 'frontend-panel/**'
    branches: [master]
  pull_request:
    paths:
      - 'frontend-panel/**'
    branches: [master]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: frontend-panel
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: frontend-panel
        run: bun run check

      - name: Run tests
        working-directory: frontend-panel
        run: bun run test
